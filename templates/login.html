<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | HomeDash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: ['class'] }
    </script>
    <style>
        body { background-color:#0a0a0f; color:#f8fafc;
               font-family:'Inter',ui-sans-serif,system-ui,sans-serif; }
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0 1000px rgba(255,255,255,0.05) inset !important;
            -webkit-text-fill-color: #f8fafc !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center gap-3 mb-2">
            <div class="w-10 h-10 rounded-xl bg-white/10 border border-white/10 flex items-center justify-center">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
            </div>
            <span class="text-2xl font-bold tracking-tight">HomeDash</span>
        </div>
        <p class="text-white/40 text-sm">Sign in to your dashboard</p>
    </div>

    <!-- Card -->
    <div class="rounded-2xl border border-white/10 bg-white/[0.03] p-7 shadow-2xl backdrop-blur">

        {% if form.errors %}
        <div class="mb-5 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/20 flex items-center gap-2.5">
            <svg class="w-4 h-4 text-red-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-sm text-red-400">Invalid username or password.</p>
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

            <div>
                <label class="block text-sm font-medium mb-1.5 text-white/80">Username</label>
                <input type="text" name="username" autofocus autocomplete="username" required
                    class="w-full px-3.5 py-2.5 rounded-lg border border-white/10 bg-white/5 text-sm outline-none focus:border-white/25 focus:bg-white/8 transition-colors placeholder:text-white/20 text-white"
                    placeholder="Enter your username">
            </div>

            <div>
                <label class="block text-sm font-medium mb-1.5 text-white/80">Password</label>
                <input type="password" name="password" autocomplete="current-password" required
                    class="w-full px-3.5 py-2.5 rounded-lg border border-white/10 bg-white/5 text-sm outline-none focus:border-white/25 transition-colors placeholder:text-white/20 text-white"
                    placeholder="Enter your password">
            </div>

            <button type="submit"
                class="w-full py-2.5 bg-white text-black rounded-lg font-semibold text-sm hover:bg-white/90 active:scale-[0.98] transition-all mt-2">
                Sign In
            </button>
        </form>
    </div>

    <p class="text-center text-xs text-white/20 mt-6">
        HomeDash &mdash; self-hosted home server dashboard
    </p>
</div>

</body>
</html>
