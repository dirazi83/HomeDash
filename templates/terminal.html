{% extends 'base.html' %}
{% block title %}Terminal | HomeDash{% endblock %}
{% block header %}Terminal{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css"/>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.js"></script>
<style>
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }
    .xterm-screen { height: 100% !important; }
</style>
{% endblock %}

{% block content %}
<div class="flex flex-col" style="height: calc(100vh - 8rem);">
    <div class="flex-1 flex flex-col rounded-xl border border-white/10 bg-[#0d0d0d] shadow-xl overflow-hidden min-h-0">

        <!-- Title bar -->
        <div class="flex-shrink-0 px-4 py-2.5 border-b border-white/10 flex items-center gap-3 bg-[#1a1a1a] select-none">
            <div class="flex gap-1.5">
                <span class="w-3 h-3 rounded-full bg-[#ff5f57]"></span>
                <span class="w-3 h-3 rounded-full bg-[#febc2e]"></span>
                <span class="w-3 h-3 rounded-full bg-[#28c840]"></span>
            </div>
            <span class="text-xs text-white/40 font-mono">bash &mdash; root@HomeDashboard</span>
            <div class="ml-auto flex items-center gap-2">
                <span id="conn-dot" class="w-2 h-2 rounded-full bg-yellow-400 transition-colors"></span>
                <span id="conn-label" class="text-xs text-white/40 font-mono">connecting…</span>
            </div>
        </div>

        <!-- xterm.js mount -->
        <div id="terminal-mount" class="flex-1 min-h-0 p-2"></div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
(function () {
    const term = new Terminal({
        cursorBlink: true,
        scrollback: 5000,
        fontFamily: '"Cascadia Code", "Fira Code", Menlo, Monaco, "Courier New", monospace',
        fontSize: 13,
        lineHeight: 1.3,
        theme: {
            background:       '#0d0d0d',
            foreground:       '#e2e8f0',
            cursor:           '#10b981',
            cursorAccent:     '#0d0d0d',
            selectionBackground: 'rgba(255,255,255,0.15)',
            black:   '#1a1a1a', red:     '#f87171', green:   '#4ade80',
            yellow:  '#facc15', blue:    '#60a5fa', magenta: '#c084fc',
            cyan:    '#22d3ee', white:   '#e2e8f0',
            brightBlack:   '#4b5563', brightRed:   '#fca5a5', brightGreen:   '#86efac',
            brightYellow:  '#fde68a', brightBlue:  '#93c5fd', brightMagenta: '#d8b4fe',
            brightCyan:    '#67e8f9', brightWhite: '#f9fafb',
        },
    });

    const fitAddon  = new FitAddon.FitAddon();
    const linksAddon = new WebLinksAddon.WebLinksAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(linksAddon);

    const mount = document.getElementById('terminal-mount');
    term.open(mount);
    fitAddon.fit();

    // Status bar
    const dot   = document.getElementById('conn-dot');
    const label = document.getElementById('conn-label');
    function setStatus(state) {
        const states = {
            connecting: ['bg-yellow-400', 'connecting…'],
            open:       ['bg-emerald-500', 'connected'],
            closed:     ['bg-red-500',     'disconnected'],
            error:      ['bg-red-500',     'error'],
        };
        const [cls, txt] = states[state] || states.error;
        dot.className = `w-2 h-2 rounded-full transition-colors ${cls}`;
        label.textContent = txt;
    }

    // Open WebSocket
    const proto = window.location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${window.location.host}/ws/terminal/`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = function () {
        setStatus('open');
        ws.send(JSON.stringify({ type: 'resize', rows: term.rows, cols: term.cols }));
        term.focus();
    };

    ws.onmessage = function (e) {
        if (e.data instanceof ArrayBuffer) {
            term.write(new Uint8Array(e.data));
        } else {
            term.write(e.data);
        }
    };

    ws.onclose = function () {
        setStatus('closed');
        term.write('\r\n\x1b[2m[connection closed — refresh to reconnect]\x1b[0m\r\n');
    };

    ws.onerror = function () { setStatus('error'); };

    // Keystrokes → WebSocket
    term.onData(function (data) {
        if (ws.readyState === WebSocket.OPEN) {
            ws.send(new TextEncoder().encode(data));
        }
    });

    // Terminal resize
    function sendResize() {
        fitAddon.fit();
        if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'resize', rows: term.rows, cols: term.cols }));
        }
    }
    window.addEventListener('resize', sendResize);
    new ResizeObserver(sendResize).observe(mount);
})();
</script>
{% endblock %}
